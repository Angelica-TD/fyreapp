name: Deploy FyreApp (DRY RUN)

on:
  workflow_dispatch:

jobs:
  dry-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node (for npm build)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Restore
        run: dotnet restore

      - name: Publish Web (self-contained linux-x64)
        run: dotnet publish ./FyreApp.csproj -c Release -r linux-x64 --self-contained true -o out/web

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Upload release (dry run)
        run: |
          RELEASE="dryrun-$(date +%Y%m%d-%H%M%S)"
          echo "RELEASE=$RELEASE" >> $GITHUB_ENV

          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "\
            set -e; \
            mkdir -p /var/www/fyreapp/releases/$RELEASE; \
          "

          rsync -az --delete -e "ssh -p ${{ secrets.VPS_PORT }}" out/web/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/fyreapp/releases/$RELEASE/

      - name: Validate on server (no switch, no restart)
        run: |
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "\
            set -euo pipefail; \
            RELEASE='${{ env.RELEASE }}'; \
            test -f /var/www/fyreapp/releases/$RELEASE/FyreApp; \
            chmod +x /var/www/fyreapp/releases/$RELEASE/FyreApp; \
            echo '✅ Dry run upload looks good:'; \
            ls -la /var/www/fyreapp/releases/$RELEASE/FyreApp; \
            echo 'Current still points to:'; \
            readlink -f /var/www/fyreapp/current; \
          "
