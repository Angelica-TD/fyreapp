name: Deploy FyreApp (releases + rollback)

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install LibMan CLI
        run: dotnet tool install -g Microsoft.Web.LibraryManager.Cli

      - name: Restore client libraries (LibMan)
        run: libman restore

      - name: Setup Node (for npm build)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef --version 10.0.3

      - name: Restore
        run: dotnet restore ./FyreApp.csproj

      - name: Build (show real errors)
        run: dotnet build ./FyreApp.csproj -c Release -r linux-x64 -v normal -bl:build.binlog

      - name: Run tests
        run: dotnet test FyreApp.Tests/FyreApp.Tests.csproj -c Release

      - name: Build EF migration bundle (linux-x64)
        run: >
          dotnet ef migrations bundle
          --verbose
          --project ./FyreApp.csproj
          --startup-project ./FyreApp.csproj
          --configuration Release
          --runtime linux-x64
          --self-contained
          --output out/db/migrate


      - name: Publish Web (self-contained linux-x64)
        run: dotnet publish ./FyreApp.csproj -c Release -r linux-x64 --self-contained true -o out/web

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Upload release
        run: |
          RELEASE="release-$(date +%Y%d%m-%H%M%S)"
          echo "RELEASE=$RELEASE" >> $GITHUB_ENV

          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "\
            set -e; \
            mkdir -p /var/www/fyreapp/releases/$RELEASE; \
            mkdir -p /var/www/fyreapp/releases/$RELEASE/db; \
          "

          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "\
            set -e; \
            ls -la /var/www/fyreapp/releases/$RELEASE; \
            ls -la /var/www/fyreapp/releases/$RELEASE/db; \
          "


          rsync -az --delete -e "ssh -p ${{ secrets.VPS_PORT }}" out/web/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/fyreapp/releases/$RELEASE/

          rsync -az -e "ssh -p ${{ secrets.VPS_PORT }}" out/db/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/fyreapp/releases/$RELEASE/db/


      - name: Switch current + restart (safe)
        run: |
          ssh -T -p ${{ secrets.VPS_PORT }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            RELEASE=${{ env.RELEASE }} \
            'bash -s' <<'SSH'
          set -euo pipefail

          RELEASE_DIR="/var/www/fyreapp/releases/$RELEASE"

          test -f "$RELEASE_DIR/FyreApp"
          chmod +x "$RELEASE_DIR/FyreApp"

          test -f "$RELEASE_DIR/db/migrate"
          chmod +x "$RELEASE_DIR/db/migrate"

          if [ ! -f /etc/fyreapp.env ]; then
            echo "Missing /etc/fyreapp.env"
            exit 1
          fi

          set -a
          source /etc/fyreapp.env
          set +a

          if [ -z "${ConnectionStrings__DefaultConnection:-}" ]; then
            echo "Missing ConnectionStrings__DefaultConnection in /etc/fyreapp.env"
            exit 1
          fi

          echo "Applying EF migrations..."
          "$RELEASE_DIR/db/migrate" --connection "$ConnectionStrings__DefaultConnection"

          PREV="$(readlink -f /var/www/fyreapp/current || true)"
          echo "Previous current: $PREV"

          ln -sfn "$RELEASE_DIR" /var/www/fyreapp/current
          echo "Now current -> $(readlink -f /var/www/fyreapp/current)"

          sudo -n systemctl restart fyreapp

          if ! systemctl is-active --quiet fyreapp; then
            echo "Service failed. Rolling back..."
            if [ -n "$PREV" ] && [ -d "$PREV" ]; then
              ln -sfn "$PREV" /var/www/fyreapp/current
              sudo -n systemctl restart fyreapp || true
            fi
            sudo -n systemctl --no-pager --full status fyreapp | head -n 60 || true
            exit 1
          fi

          ls -1dt /var/www/fyreapp/releases/release-* | tail -n +6 | xargs -r rm -rf
          sudo -n systemctl --no-pager --full status fyreapp | head -n 40
          SSH
