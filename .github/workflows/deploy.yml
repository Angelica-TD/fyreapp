name: Deploy FyreApp (releases + rollback)

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node (for npm build)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Restore
        run: dotnet restore

      - name: Publish Web (self-contained linux-x64)
        run: dotnet publish ./FyreApp.csproj -c Release -r linux-x64 --self-contained true -o out/web

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Upload release
        run: |
          RELEASE="release-$(date +%Y%m%d-%H%M%S)"
          echo "RELEASE=$RELEASE" >> $GITHUB_ENV

          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "\
            set -e; \
            mkdir -p /var/www/fyreapp/releases/$RELEASE; \
          "

          rsync -az --delete -e "ssh -p ${{ secrets.VPS_PORT }}" out/web/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/fyreapp/releases/$RELEASE/

      - name: Switch current + restart (safe)
        run: |
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "\
            set -euo pipefail; \
            RELEASE='${{ env.RELEASE }}'; \
            \
            # Validate new release
            test -f /var/www/fyreapp/releases/$RELEASE/FyreApp; \
            chmod +x /var/www/fyreapp/releases/$RELEASE/FyreApp; \
            \
            # Remember previous target for rollback-on-fail
            PREV=\$(readlink -f /var/www/fyreapp/current || true); \
            echo \"Previous current: \$PREV\"; \
            \
            # Ensure current is a symlink (not a directory)
            rm -rf /var/www/fyreapp/current; \
            ln -s /var/www/fyreapp/releases/$RELEASE /var/www/fyreapp/current; \
            \
            # Restart
            sudo systemctl restart fyreapp; \
            \
            # If restart failed, rollback immediately
            if ! systemctl is-active --quiet fyreapp; then \
              echo '❌ Service failed. Rolling back...'; \
              if [ -n \"\$PREV\" ] && [ -d \"\$PREV\" ]; then \
                rm -rf /var/www/fyreapp/current; \
                ln -s \"\$PREV\" /var/www/fyreapp/current; \
                sudo systemctl restart fyreapp || true; \
              fi; \
              sudo systemctl --no-pager --full status fyreapp | head -n 60; \
              exit 1; \
            fi; \
            \
            # Keep last 5 releases (excluding dry runs)
            ls -1dt /var/www/fyreapp/releases/release-* | tail -n +6 | xargs -r rm -rf; \
            \
            sudo systemctl --no-pager --full status fyreapp | head -n 40; \
          "
